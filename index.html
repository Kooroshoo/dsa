<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leetcode Cheat Sheet & Analyzer</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
</head>
<body>

    <header id="site-header" class="header-section">
        <div class="header-content">
            <h1 id="page-title">Loading...</h1>
            <p id="page-intro"></p>
        </div>
    </header>

    <main class="container">
        <div id="main-container"></div>
        
        <h2 class="section-title">Test Custom Problem</h2>
        <div class="custom-input-section">
            <input type="text" id="custom-title" placeholder="Problem Title (e.g., Trapping Rain Water)" autocomplete="off" />
            <textarea id="custom-desc" rows="6" placeholder="Paste the full LeetCode description, examples, and constraints here..."></textarea>
            <div class="button-group">
                <button id="analyze-btn">Analyze Problem</button>
                <button id="clear-btn" class="secondary-btn">Clear</button>
            </div>
        </div>
        <div id="custom-result" class="questions-list" style="margin-bottom: 3rem;"></div>

        <details class="preloaded-details">
            <summary>View Pre-Loaded Questions (questions.md)</summary>
            <div id="questions-container" class="questions-list">
                <p>Loading questions.md...</p>
            </div>
        </details>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
